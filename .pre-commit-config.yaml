# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks


# Make sure that the additional_dependencies here match pyproject.toml

ci:
  autofix_prs: false
  autoupdate_schedule: quarterly
  autoupdate_commit_msg: 'Bump `pre-commit` Hooks to Latest Versions'

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: check-yaml
    -   id: check-added-large-files
    -   id: check-ast
    -   id: check-case-conflict
    -   id: check-docstring-first
    -   id: check-executables-have-shebangs
    -   id: check-json
    -   id: check-shebang-scripts-are-executable
    -   id: check-merge-conflict
    -   id: check-xml
    -   id: mixed-line-ending
    -   id: requirements-txt-fixer
#-   repo: https://github.com/pre-commit/mirrors-autopep8
#    rev: 'v1.6.0'
#    hooks:
#    -   id: autopep8
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 'v0.12.8'
    hooks:
    -   id: ruff
        name: ruff
        additional_dependencies:
        -   httpx~=0.27
        -   tornado~=6.4
        -   APScheduler~=3.10.4
        -   cachetools>=5.3.3,<5.5.0
        -   aiolimiter~=1.1,<1.3
-   repo: https://github.com/psf/black-pre-commit-mirror
    rev: 25.1.0
    hooks:
    -   id: black
        args:
        -   --diff
        -   --check
        -   --color
        -   -v
        -   --config=.pyproject.toml
-   repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
    -   id: flake8
-   repo: https://github.com/PyCQA/pylint
    rev: v3.3.8
    hooks:
    -   id: pylint
        files: ^(?!(tests|docs)).*\.py$
        additional_dependencies:
        -   httpx~=0.27
        -   tornado~=6.4
        -   APScheduler~=3.10.4
        -   cachetools>=5.3.3,<5.5.0
        -   aiolimiter~=1.1,<1.3
        -   perfplot
        -   joblib
        -   . # this basically does `pip install -e .`
-   repo: https://github.com/asottile/pyupgrade
    rev: v3.20.0
    hooks:
    -   id: pyupgrade
        args:
        -   --py39-plus
-   repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
    -   id: isort
        name: isort
        args:
        # - --check-only
        # - --diff
        -   --color
        additional_dependencies:
        -   colorama
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.17.1
    hooks:
    -   id: mypy
        additional_dependencies:
        -   types-pytz
        -   types-cryptography
        -   types-cachetools
        -   httpx~=0.27
        -   tornado~=6.4
        -   APScheduler~=3.10.4
        -   cachetools>=5.3.3,<5.5.0
        -   aiolimiter~=1.1,<1.3
        -   perfplot
        -   joblib
        -   . # this basically does `pip install -e .`
        args: [--disallow-untyped-defs, --disallow-incomplete-defs,
              --disallow-untyped-calls, --disallow-any-explicit,
              --disallow-any-generics, --disallow-subclassing-any,
              --check-untyped-defs, --warn-redundant-casts,
              --warn-unused-ignores, --warn-return-any, --warn-unreachable,
              --disallow-redefinition, --strict-equality, --strict,
              --show-error-context, --show-column-numbers, --no-strict-optional,
              --follow-imports=silent]
-   repo: https://gitlab.com/vojko.pribudic.foss/pre-commit-update
    rev: v0.8.0
    hooks:
    -   id: pre-commit-update
        # Example args (use your own configuration)
        args:
        # - --dry-run
        -   --no-all-versions # just stable, no alpha/beta
        -   --verbose
        -   --warnings
        -   --jobs=16
